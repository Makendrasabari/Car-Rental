<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly Luxury Rentals</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0F0F0F;
            --bg-primary: #111111;
            --bg-secondary: #1A1A1A;
            --accent: #d45a0d;
            --accent-hover: #b84c0a;
            --btn-bg: #d45a0d;
            --btn-bg-hover: #b84c0a;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --glass-border: rgba(212, 90, 13, 0.15);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(212, 90, 13, 0.3);
            animation: pulse-glow 2.5s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 20px rgba(212, 90, 13, 0.2); }
            50% { text-shadow: 0 0 40px rgba(212, 90, 13, 0.5); }
            100% { text-shadow: 0 0 20px rgba(212, 90, 13, 0.2); }
        }

        .error-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .error-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-home {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            padding: 14px 32px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-home:hover {
            background-color: var(--btn-bg-hover);
            box-shadow: 0 0 20px rgba(212, 90, 13, 0.5);
            transform: translateY(-3px);
        }

        .btn-home:active {
            transform: translateY(-1px);
        }

        /* Decorative background elements */
        .bg-glow-1 {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(212, 90, 13, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(212, 90, 13, 0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Luxury Path Disrupted</h1>
        <p class="error-desc">The route you are searching for has taken an unexpected detour or no longer exists. Let's get your journey back on course.</p>
        <a href="index.html" class="btn-home"><i class="fa-solid fa-arrow-left"></i> Back to Homepage</a>
    </div>
</body>
</html>
